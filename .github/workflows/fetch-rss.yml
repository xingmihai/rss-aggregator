name: Fetch RSS

on:
  schedule:
    - cron: '0 * * * *'  # 每小时的第0分钟执行一次
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Build RSS
        run: node build.js
        env:
          RSS_URLS: ${{ secrets.RSS_URLS }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/articles.json
          git diff --cached --quiet || git commit -m "Update RSS feed [$(date +%Y-%m-%d_%H:%M)]"
          git push
